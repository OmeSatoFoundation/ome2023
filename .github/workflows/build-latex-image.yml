name: Build and Push ome-doc Container Image

on:
  push:
    tags:
      - "buildenv-**"
    branches:
      - "workflow-dev"
      - "master"

env:
  REGISTRY: ghcr.io
jobs:
  build-and-push:
    env:
      IMAGE_NAME: texlive
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: "false"
    - name: Rewrite GitHub SSH URLs to HTTPS for CI
      run: |
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
    - name: Initialize submodules
      run: |
        git submodule sync --recursive
        git submodule update --init --recursive
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Create the GitHub Repository Name with All Small Cases
      run: |
        echo "REPOSITORY_NAME_LC=${REPOSITORY_NAME,,}" >>"${GITHUB_ENV}"
      env:
        REPOSITORY_NAME: '${{ github.repository }}'
    - name: Build and Push Container
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        file: docker/text.Dockerfile
        tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY_NAME_LC }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

